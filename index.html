<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Vault | Luxury Logistics</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #C5A059; --black: #050505; --dark: #111; --white: #fff; }
        body { background: var(--black); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* Login UI */
        #login-overlay {
            position: fixed; inset: 0; background: var(--black); 
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-box {
            background: var(--dark); padding: 40px; border: 1px solid var(--gold);
            text-align: center; width: 300px; border-radius: 8px;
        }
        input { 
            width: 100%; padding: 10px; margin: 10px 0; background: #222; 
            border: 1px solid #444; color: white; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 12px; background: var(--gold); border: none; 
            cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px;
        }

        /* Layout */
        header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none !important; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* Customer Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .car-card { background: var(--dark); border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .car-image { height: 180px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .car-info { padding: 20px; }
        .car-info h3 { margin: 0; color: var(--gold); }

        /* Admin Table */
        table { width: 100%; border-collapse: collapse; background: var(--dark); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        th { color: var(--gold); text-transform: uppercase; font-size: 0.8rem; }
        .admin-controls { margin-bottom: 20px; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color: var(--gold)">ELITE VAULT</h2>
        <p>Authentication Required</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Access Vault</button>
        <p style="font-size: 0.8rem; color: #666; margin-top: 15px;">Admin: admin / admin<br>Customer: leave blank</p>
    </div>
</div>

<div id="app" class="hidden">
    <header>
        <h2 style="color: var(--gold); letter-spacing: 2px;">ELITE VAULT</h2>
        <div id="user-tag"></div>
        <button onclick="location.reload()" style="width: auto; padding: 5px 15px; font-size: 0.7rem;">Logout</button>
    </header>

    <div id="customer-view" class="container hidden">
        <h1 style="font-weight: 200;">Available Collection</h1>
        <div id="inventory-grid" class="grid"></div>
    </div>

    <div id="admin-view" class="container hidden">
        <h1>Inventory Control</h1>
        <div class="admin-controls">
            <button onclick="addRandomCar()" style="width: auto;">+ Add High-End Unit</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Vehicle</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="admin-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const SB_URL = "https://jzenwyfveijwnmppsnyj.supabase.co";
    const SB_KEY = "sb_publishable_fOQPV3iQwMaqbOaHAk1BKw__SAM9Fad";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = 'customer';

    function handleLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if (user === 'admin' && pass === 'admin') {
            currentUser = 'admin';
            showView('admin-view');
        } else {
            currentUser = 'customer';
            showView('customer-view');
        }

        document.getElementById('login-overlay').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('user-tag').innerText = `Role: ${currentUser.toUpperCase()}`;
        loadData();
    }

    function showView(viewId) {
        document.getElementById('customer-view').classList.add('hidden');
        document.getElementById('admin-view').classList.add('hidden');
        document.getElementById(viewId).classList.remove('hidden');
    }

    async function loadData() {
        const { data, error } = await _supabase.from('inventory').select('*');
        if (error) return console.error(error);

        if (currentUser === 'admin') {
            renderAdmin(data);
        } else {
            renderCustomer(data);
        }
    }

    function renderCustomer(cars) {
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = cars.map(car => `
            <div class="car-card">
                <div class="car-image">🏎️</div>
                <div class="car-info">
                    <h3>${car.make} ${car.model}</h3>
                    <p>${car.year} | $${Number(car.price).toLocaleString()}</p>
                    <button style="font-size: 0.8rem">View Details</button>
                </div>
            </div>
        `).join('');
    }

    function renderAdmin(cars) {
        const tbody = document.getElementById('admin-table-body');
        tbody.innerHTML = cars.map(car => `
            <tr>
                <td>${car.make} ${car.model} (${car.year})</td>
                <td>$${Number(car.price).toLocaleString()}</td>
                <td><span style="color:var(--gold)">${car.status}</span></td>
                <td><button onclick="deleteCar('${car.id}')" style="background: #331111; color: #ff4444; border: 1px solid #441111; padding: 5px 10px;">Remove</button></td>
            </tr>
        `).join('');
    }

    async function addRandomCar() {
        const { error } = await _supabase.from('inventory').insert([
            { make: 'Bugatti', model: 'Chiron', year: 2024, price: 3000000, status: 'In Vault' }
        ]);
        if (error) alert(error.message);
        else loadData();
    }

    async function deleteCar(id) {
        const { error } = await _supabase.from('inventory').delete().eq('id', id);
        if (error) alert(error.message);
        else loadData();
    }
</script>
</body>
</html>
