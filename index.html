<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Vault | Luxury Auto Logistics</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold: #C5A059;
            --black: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(197, 160, 89, 0.3);
        }

        body {
            background-color: var(--black);
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        /* Luxury Header */
        header {
            padding: 4rem 2rem;
            text-align: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            border-bottom: 1px solid var(--border);
        }

        h1 {
            color: var(--gold);
            font-size: 3rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin: 0;
            font-weight: 200;
        }

        .subtitle {
            color: #888;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        /* Dashboard Stats */
        .container {
            max-width: 1200px;
            margin: -40px auto 40px;
            padding: 0 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 25px;
            border: 1px solid var(--border);
            border-radius: 4px;
            text-align: center;
        }

        .stat-card h2 {
            color: var(--gold);
            margin: 0;
            font-size: 1.8rem;
        }

        /* Inventory Grid */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .car-card {
            background: #111;
            border: 1px solid #222;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .car-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .car-image {
            height: 200px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #222;
        }

        .car-content {
            padding: 20px;
        }

        .status-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            padding: 4px 12px;
            border: 1px solid var(--gold);
            color: var(--gold);
            display: inline-block;
            margin-bottom: 15px;
        }

        .price {
            font-size: 1.4rem;
            color: var(--gold);
            font-weight: bold;
        }

        .loader {
            text-align: center;
            color: var(--gold);
            padding: 50px;
            font-size: 1.2rem;
        }

        button {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px 25px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: var(--gold);
            color: var(--black);
        }
    </style>
</head>
<body>

    <header>
        <h1>ELITE VAULT</h1>
        <div class="subtitle">PRESTIGE AUTOMOTIVE LOGISTICS</div>
    </header>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <p>Vault Capacity</p>
                <h2 id="total-count">0</h2>
            </div>
            <div class="stat-card">
                <p>Inventory Value</p>
                <h2 id="total-value">$0</h2>
            </div>
        </div>

        <div style="text-align: right; margin-bottom: 20px;">
            <button onclick="loadInventory()">Refresh Live Feed</button>
        </div>

        <div id="loader" class="loader">Establishing Secure Connection...</div>
        <div class="inventory-grid" id="inventory-list"></div>
    </div>

    <script>
        // Supabase Initialization using your specific credentials
        const SB_URL = "https://jzenwyfveijwnmppsnyj.supabase.co";
        const SB_KEY = "sb_publishable_fOQPV3iQwMaqbOaHAk1BKw__SAM9Fad";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function loadInventory() {
            const listElement = document.getElementById('inventory-list');
            const loader = document.getElementById('loader');
            
            loader.style.display = 'block';
            listElement.innerHTML = '';

            try {
                const { data, error } = await _supabase
                    .from('inventory')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                loader.style.display = 'none';

                let totalValue = 0;

                data.forEach(car => {
                    totalValue += (car.price || 0);
                    const card = `
                        <div class="car-card">
                            <div class="car-image">
                                <span style="font-size: 3rem; opacity: 0.3;">🏎️</span>
                            </div>
                            <div class="car-content">
                                <div class="status-tag">${car.status}</div>
                                <h3>${car.year} ${car.make} ${car.model}</h3>
                                <div class="price">$${Number(car.price).toLocaleString()}</div>
                            </div>
                        </div>
                    `;
                    listElement.innerHTML += card;
                });

                // Update Stats
                document.getElementById('total-count').innerText = data.length;
                document.getElementById('total-value').innerText = `$${(totalValue / 1000000).toFixed(2)}M`;

            } catch (err) {
                loader.innerHTML = "Access Denied: Connection to Vault Failed.";
                console.error(err);
            }
        }

        // Run on start
        loadInventory();
    </script>
</body>
</html>
