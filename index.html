<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Vault | Luxury Automotive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #C5A059; --black: #050505; --dark: #111; --white: #fff; }
        body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; margin: 0; }
        
        /* Modal - Specs Sheet */
        #spec-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .spec-sheet {
            background: #0a0a0a; border: 1px solid var(--gold); width: 90%; max-width: 500px;
            padding: 30px; position: relative; border-radius: 4px;
        }
        .spec-row { 
            display: flex; justify-content: space-between; padding: 12px 0; 
            border-bottom: 1px solid #222; font-size: 0.9rem;
        }
        .spec-label { color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }

        /* Buy Button (Tally Link) */
        .tally-link {
            display: block; background: var(--gold); color: black; text-align: center;
            padding: 15px; margin-top: 25px; text-decoration: none; font-weight: bold;
            letter-spacing: 1px; transition: 0.3s;
        }
        .tally-link:hover { filter: brightness(1.2); }

        /* Dashboard & Grid */
        header { padding: 30px; text-align: center; border-bottom: 1px solid #222; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .car-card { 
            background: var(--dark); border: 1px solid #222; border-radius: 8px; 
            overflow: hidden; cursor: pointer; transition: 0.3s;
        }
        .car-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .car-info { padding: 20px; }
        
        .close-btn { position: absolute; top: 15px; right: 20px; color: var(--gold); cursor: pointer; font-size: 1.2rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="spec-overlay">
    <div class="spec-sheet">
        <span class="close-btn" onclick="closeSpecs()">✕</span>
        <h2 id="view-title" style="margin-top:0; color:var(--gold)"></h2>
        <p id="view-subtitle" style="color:#666; margin-bottom:20px;"></p>
        
        <div id="spec-list">
            </div>

        <a href="https://tally.so/r/J9kead" target="_blank" class="tally-link">ACQUIRE THIS VEHICLE</a>
    </div>
</div>

<header>
    <h1 style="color:var(--gold); letter-spacing:5px; margin:0;">ELITE VAULT</h1>
</header>

<div class="container">
    <div id="inventory-grid" class="grid"></div>
</div>

<script>
    // Your Connection
    const SB_URL = "https://jzenwyfveijwnmppsnyj.supabase.co";
    const SB_KEY = "sb_publishable_fOQPV3iQwMaqbOaHAk1BKw__SAM9Fad";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function fetchInventory() {
        const { data, error } = await _supabase.from('inventory').select('*');
        if (error) return console.error(error);

        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = data.map(car => `
            <div class="car-card" onclick="openSpecs('${car.make}', '${car.model}', '${car.year}', '${car.price}')">
                <div style="height:180px; background:#1a1a1a; display:flex; align-items:center; justify-content:center; font-size:3rem;">🏎️</div>
                <div class="car-info">
                    <h3 style="margin:0; color:var(--gold)">${car.make} ${car.model}</h3>
                    <p style="margin:5px 0; color:#888;">Year: ${car.year}</p>
                    <div style="font-weight:bold; color:var(--gold)">$${Number(car.price).toLocaleString()}</div>
                    <p style="font-size:0.7rem; color:#555; margin-top:10px;">CLICK FOR FULL SPECS</p>
                </div>
            </div>
        `).join('');
    }

    function openSpecs(make, model, year, price) {
        document.getElementById('view-title').innerText = `${make} ${model}`;
        document.getElementById('view-subtitle').innerText = `${year} Edition | Valuation: $${Number(price).toLocaleString()}`;
        
        // Custom logic: if it's a specific brand, show specific specs
        let engine = "V8 Twin-Turbo";
        let power = "650 HP";
        let topSpeed = "205 MPH";

        if(make.toLowerCase().includes('lamborghini')) {
            engine = "6.5L V12"; power = "770 HP"; topSpeed = "217 MPH";
        } else if(make.toLowerCase().includes('ferrari')) {
            engine = "4.0L V8 Hybrid"; power = "986 HP"; topSpeed = "211 MPH";
        }

        const list = document.getElementById('spec-list');
        list.innerHTML = `
            <div class="spec-row"><span class="spec-label">Engine</span><span>${engine}</span></div>
            <div class="spec-row"><span class="spec-label">Output</span><span>${power}</span></div>
            <div class="spec-row"><span class="spec-label">Top Speed</span><span>${topSpeed}</span></div>
            <div class="spec-row"><span class="spec-label">Transmission</span><span>Dual-Clutch</span></div>
            <div class="spec-row"><span class="spec-label">Drive</span><span>All-Wheel Drive</span></div>
        `;

        document.getElementById('spec-overlay').style.display = 'flex';
    }

    function closeSpecs() {
        document.getElementById('spec-overlay').style.display = 'none';
    }

    // Initial Load
    fetchInventory();
</script>
</body>
</html>
