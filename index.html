<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Vault | Luxury Auto Logistics</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --gold: #d4af37;
            --black: #0a0a0a;
            --dark-grey: #1c1c1c;
            --white: #ffffff;
            --accent: #2c2c2c;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--black);
            color: var(--white);
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(to right, var(--black), var(--dark-grey));
            padding: 2rem;
            border-bottom: 1px solid var(--gold);
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 4px;
            color: var(--gold);
            text-transform: uppercase;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--dark-grey);
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--gold);
            text-align: center;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .car-card {
            background: var(--accent);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
            border: 1px solid #333;
        }

        .car-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
        }

        .car-info {
            padding: 1.5rem;
        }

        .car-info h3 {
            margin: 0 0 0.5rem 0;
            color: var(--gold);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            background: rgba(212, 175, 55, 0.2);
            color: var(--gold);
            border: 1px solid var(--gold);
        }

        .btn-refresh {
            background: var(--gold);
            color: var(--black);
            border: none;
            padding: 0.8rem 2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .btn-refresh:hover {
            background: #b8962d;
        }

        #loading { text-align: center; font-style: italic; color: var(--gold); }
    </style>
</head>
<body>

    <header>
        <h1>Elite Vault</h1>
        <p>Prestige Inventory Management</p>
    </header>

    <div class="container">
        <div class="stats-bar">
            <div class="stat-card">
                <small>Total Valuation</small>
                <div id="valuation-total">$0.00</div>
            </div>
            <div class="stat-card">
                <small>Vehicles in Vault</small>
                <div id="car-count">0</div>
            </div>
        </div>

        <button class="btn-refresh" onclick="fetchInventory()">Sync Inventory</button>

        <div id="loading">Connecting to vault secure servers...</div>
        
        <div class="inventory-grid" id="inventory-grid">
            </div>
    </div>

    <script>
        // Supabase Configuration from your credentials
        const SUPABASE_URL = 'https://jzenwyfveijwnmppsnyj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_fOQPV3iQwMaqbOaHAk1BKw__SAM9Fad';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchInventory() {
            const grid = document.getElementById('inventory-grid');
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            grid.innerHTML = '';

            try {
                // Adjust 'cars' to your actual table name in Supabase
                const { data, error } = await supabase
                    .from('cars') 
                    .select('*');

                if (error) throw error;

                loading.style.display = 'none';
                
                if (data.length === 0) {
                    grid.innerHTML = '<p>Vault is currently empty.</p>';
                }

                data.forEach(car => {
                    const card = document.createElement('div');
                    card.className = 'car-card';
                    card.innerHTML = `
                        <div class="car-info">
                            <span class="status-badge">${car.status || 'In Stock'}</span>
                            <h3>${car.make} ${car.model}</h3>
                            <p><strong>Year:</strong> ${car.year}</p>
                            <p><strong>VIN:</strong> ${car.vin || 'N/A'}</p>
                            <p style="color: var(--gold); font-size: 1.2rem; font-weight: bold;">
                                $${Number(car.price).toLocaleString()}
                            </p>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                document.getElementById('car-count').innerText = data.length;
                const total = data.reduce((sum, car) => sum + (car.price || 0), 0);
                document.getElementById('valuation-total').innerText = `$${total.toLocaleString()}`;

            } catch (err) {
                console.error('Error fetching data:', err);
                loading.innerText = 'Access Denied: Check console for connection details.';
            }
        }

        // Initial Load
        window.onload = fetchInventory;
    </script>
</body>
</html>
