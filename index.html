<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Elite Auto Vault | Management</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --accent: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--gold);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        header h1 {
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
        }

        /* Form Styling */
        .vault-form {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        input, select {
            background: var(--accent);
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 4px;
            outline: none;
        }

        input:focus {
            border-color: var(--gold);
        }

        button {
            background: var(--gold);
            color: black;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background: #b8962d;
            transform: translateY(-2px);
        }

        /* Inventory Table */
        .inventory-section {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background: var(--accent);
            color: var(--gold);
            text-align: left;
            padding: 15px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #333;
        }

        .status-pill {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            background: #27ae60;
            color: white;
        }

        .delete-btn {
            background: #c0392b;
            color: white;
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        .delete-btn:hover {
            background: #e74c3c;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>The Elite Auto Vault</h1>
        <p>Prestige Inventory Control</p>
    </header>

    <section class="vault-form">
        <input type="text" id="carModel" placeholder="Car Model (e.g. Aventador)">
        <input type="text" id="brand" placeholder="Brand (e.g. Lamborghini)">
        <input type="number" id="year" placeholder="Year">
        <input type="text" id="vin" placeholder="VIN / Serial Number">
        <button onclick="addToVault()">Add to Collection</button>
    </section>

    <section class="inventory-section">
        <table id="inventoryTable">
            <thead>
                <tr>
                    <th>Brand</th>
                    <th>Model</th>
                    <th>Year</th>
                    <th>VIN</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="inventoryBody">
                </tbody>
        </table>
    </section>
</div>

<script>
    // Initial dummy data
    let inventory = [
        { brand: 'Ferrari', model: 'SF90 Stradale', year: 2023, vin: 'FE77890X', status: 'In Vault' },
        { brand: 'Porsche', model: '911 GT3 RS', year: 2024, vin: 'PO11223Z', status: 'In Vault' }
    ];

    function renderTable() {
        const tbody = document.getElementById('inventoryBody');
        tbody.innerHTML = '';

        inventory.forEach((car, index) => {
            const row = `
                <tr>
                    <td><strong>${car.brand}</strong></td>
                    <td>${car.model}</td>
                    <td>${car.year}</td>
                    <td><code>${car.vin}</code></td>
                    <td><span class="status-pill">${car.status}</span></td>
                    <td><button class="delete-btn" onclick="removeItem(${index})">Remove</button></td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    function addToVault() {
        const brand = document.getElementById('brand').value;
        const model = document.getElementById('carModel').value;
        const year = document.getElementById('year').value;
        const vin = document.getElementById('vin').value;

        if (brand && model && year && vin) {
            inventory.push({ brand, model, year, vin, status: 'In Vault' });
            renderTable();
            
            // Clear inputs
            document.getElementById('brand').value = '';
            document.getElementById('carModel').value = '';
            document.getElementById('year').value = '';
            document.getElementById('vin').value = '';
        } else {
            alert("Please fill in all vehicle specifications.");
        }
    }

    function removeItem(index) {
        if(confirm("Confirm removal from the Elite Vault?")) {
            inventory.splice(index, 1);
            renderTable();
        }
    }

    // Load initial data
    renderTable();
</script>

</body>
</html>
